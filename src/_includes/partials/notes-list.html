<ul class="notes-list flow">
  {% for item in notesListItems %}
  <li class="flow">
    <div class="note">
      {% if item.data.title %}
        <h3 class="note__title">
          <a {% if item.data.lang %}lang="{{item.data.lang}}"{% endif %}
            class="note__title"
            href="{{ item.url }}">{{ item.data.title }}</a>
        </h3>
      {% else %}
        <div class="note__small">
          <h3>
            <a class=""
              href="{{ item.url }}">Note:
              <time datetime="{{ item.date | w3DateFilter }}">{{ item.date | dateTimeFilter }}</time>
            </a>
          </h3>
          {{ item.data.content | safe }}
        </div>
      {% endif %}
    </div>
  </li>
  {% endfor %}
</ul>
