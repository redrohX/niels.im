[build]
  command = "npm run build"
  publish = "dist"

[[plugins]]
  package = "netlify-plugin-cache-folder"

[[redirects]]
  from = "/.well-known/webfinger"
  to = "https://indieweb.social/.well-known/webfinger?resource=acct:niels@indieweb.social"
  status = 200

[[redirects]]
  from = "/@social"
  to = "https://indieweb.social/@niels"
  status = 200
